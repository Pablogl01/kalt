services:

  # ── Laravel App (PHP 8.3-FPM) ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: kalt_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kalt_network

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: kalt_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - kalt_network

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kalt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kalt
      POSTGRES_USER: kalt_user
      POSTGRES_PASSWORD: kalt_secure_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalt_user -d kalt"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kalt_network

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kalt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kalt_network

  # ── Queue Worker ─────────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: kalt_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - app
      - redis
    networks:
      - kalt_network

  # ── Vite / Vue 3 dev server ───────────────────────────────────────────────────
  vite:
    image: node:22-alpine
    container_name: kalt_vite
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - kalt_network

volumes:
  postgres_data:
  redis_data:

networks:
  kalt_network:
    driver: bridge
